<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghibli Kitchen | One Last Thing</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=EB+Garamond:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-night: #050d14; 
            --accent-gold: #ffd166; 
            --accent-warm: #ff9f43;
            --accent-lemon: #fff2ac;
            --text-pearl: #fdfaf5; 
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: var(--bg-night); 
            font-family: 'EB Garamond', serif;
            cursor: none;
        }

        #container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0e1e2d 0%, #050d14 100%);
        }

        /* ОБНОВЛЕННАЯ ЗАМЕТНАЯ КНОПКА */
        .btn-last {
            display: inline-block;
            padding: 24px 70px;
            background: rgba(255, 209, 102, 0.05); /* Легкая подложка */
            color: var(--accent-gold);
            border: 1px solid rgba(255, 209, 102, 0.3);
            border-radius: 60px;
            cursor: none;
            font-family: 'Alice', serif;
            font-size: 1.3rem; /* Чуть крупнее */
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            position: relative;
            z-index: 100;
            opacity: 0;
            
            /* Анимации: Появление -> Левитация -> Пульсация свечения */
            animation: 
                fadeInBtn 3s forwards 1.5s, 
                float 4s ease-in-out infinite 4.5s,
                glowPulse 3s infinite ease-in-out 4.5s;
            
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Эффект расходящейся волны (Ripple) */
        .btn-last::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 60px;
            border: 1px solid var(--accent-gold);
            opacity: 0;
            animation: ripple 3s infinite 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes glowPulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(255, 209, 102, 0.1); 
                border-color: rgba(255, 209, 102, 0.3);
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 209, 102, 0.3); 
                border-color: rgba(255, 209, 102, 0.8);
                background: rgba(255, 209, 102, 0.08);
            }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .btn-last:hover {
            background: rgba(255, 209, 102, 0.15);
            border-color: var(--accent-gold);
            box-shadow: 0 0 60px rgba(255, 209, 102, 0.4);
            letter-spacing: 6px;
            color: #fff;
            transform: scale(1.05) translateY(-10px) !important;
        }

        @keyframes fadeInBtn { to { opacity: 1; } }

        /* Остальные стили (курсор, светлячки) остаются прежними */
        #custom-cursor {
            position: fixed;
            width: 10px; height: 10px;
            background: var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 15px var(--accent-gold), 0 0 30px var(--accent-gold);
            transform: translate(-50%, -50%);
            will-change: left, top;
        }

        .cursor-trail {
            position: fixed;
            background: var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: sparkleAndFade 1.1s forwards ease-out;
            will-change: transform, opacity;
            box-shadow: 0 0 10px var(--accent-gold);
        }

        @keyframes sparkleAndFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) translate(calc(var(--rx) * 1px), calc(var(--ry) * 1px)) scale(0); 
            }
        }

        .firefly {
            position: absolute;
            background: var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1.5px);
            box-shadow: 0 0 15px var(--accent-gold), 0 0 30px var(--accent-warm);
            opacity: 0;
            animation: drift var(--d) infinite ease-in-out, blink var(--b) infinite ease-in-out;
            will-change: transform, opacity;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(var(--dx1), var(--dy1)) rotate(90deg); }
            66% { transform: translate(var(--dx2), var(--dy2)) rotate(-90deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; transform: scale(0.6); }
            50% { opacity: 0.8; transform: scale(var(--s)); }
        }
    </style>
</head>
<body onclick="resyncMusic()">

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="click-sound"><source src="click.mp3" type="audio/mpeg"></audio>

<div id="custom-cursor"></div>

<div id="container">
    <div id="fireflies-layer"></div>
    <a href="playlist.html" class="btn-last" onclick="handleFinalClick(event)">One last thing...</a>
</div>

<script>
    const audio = document.getElementById('bg-music');
    const clickSound = document.getElementById('click-sound');

    function resyncMusic() {
        if (audio.paused) {
            const savedTime = localStorage.getItem('musicTime');
            if (savedTime) audio.currentTime = savedTime;
            audio.volume = 0.4;
            audio.play().catch(() => {});
        }
    }

    setInterval(() => {
        if (!audio.paused) localStorage.setItem('musicTime', audio.currentTime);
    }, 1000);

    window.onload = () => {
        const savedTime = localStorage.getItem('musicTime');
        if (savedTime) audio.currentTime = savedTime;
        audio.play().catch(() => {});
    };

    function handleFinalClick(e) {
        e.preventDefault();
        clickSound.play();
        localStorage.setItem('musicTime', audio.currentTime);
        setTimeout(() => {
            window.location.href = e.target.getAttribute('href');
        }, 500);
    }

    const layer = document.getElementById('fireflies-layer');
    const colors = ['--accent-gold', '--accent-warm', '--accent-lemon'];
    const count = 50;

    for (let i = 0; i < count; i++) {
        const firefly = document.createElement('div');
        firefly.className = 'firefly';
        const size = Math.random() * 4 + 2;
        firefly.style.width = size + 'px';
        firefly.style.height = size + 'px';
        firefly.style.left = Math.random() * 100 + 'vw';
        firefly.style.top = Math.random() * 100 + 'vh';
        const color = colors[Math.floor(Math.random() * colors.length)];
        firefly.style.background = `var(${color})`;
        firefly.style.boxShadow = `0 0 15px var(${color}), 0 0 30px var(${color})`;
        firefly.style.setProperty('--d', (Math.random() * 15 + 10) + 's');
        firefly.style.setProperty('--b', (Math.random() * 5 + 3) + 's');
        firefly.style.setProperty('--dx1', (Math.random() * 150 - 75) + 'px');
        firefly.style.setProperty('--dy1', (Math.random() * 150 - 75) + 'px');
        firefly.style.setProperty('--dx2', (Math.random() * 150 - 75) + 'px');
        firefly.style.setProperty('--dy2', (Math.random() * 150 - 75) + 'px');
        firefly.style.setProperty('--s', (Math.random() * 0.5 + 1)); 
        firefly.style.animationDelay = (Math.random() * 8) + 's';
        layer.appendChild(firefly);
    }

    const cursor = document.getElementById('custom-cursor');
    let lastPos = { x: 0, y: 0 };

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';

        const dist = Math.hypot(e.clientX - lastPos.x, e.clientY - lastPos.y);
        if (dist > 10) {
            for (let i = 0; i < 3; i++) {
                const trail = document.createElement('div');
                trail.className = 'cursor-trail';
                trail.style.left = e.clientX + 'px';
                trail.style.top = e.clientY + 'px';
                const size = Math.random() * 3 + 2;
                trail.style.width = size + 'px';
                trail.style.height = size + 'px';
                trail.style.setProperty('--rx', (Math.random() * 40 - 20));
                trail.style.setProperty('--ry', (Math.random() * 40 - 20));
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 1100);
            }
            lastPos = { x: e.clientX, y: e.clientY };
        }
    });
</script>

</body>
</html>
