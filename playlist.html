<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastya’s Music Restaurant | Bella Notte</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Cookie&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wine-red: #4a0e0e; 
            --gold: #d4af37;
            --paper: #f4eade;
            --dark-overlay: rgba(20, 5, 5, 0.95);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #2a0505; 
            font-family: 'EB Garamond', serif;
            color: var(--paper);
            overflow-x: hidden;
            cursor: none; 
        }

        /* ЗВЕЗДНЫЙ ФОН */
        #starfield {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #4a0e0e 0%, #2a0505 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { transform: scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            50% { transform: scale(1); opacity: 1; text-shadow: 0 0 10px white; }
            80% { opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        #game-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 140px;
        }

        .gif-container {
            margin-top: 40px;
            width: 250px; height: 250px;
            border: 6px solid var(--gold);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            animation: floating 3s ease-in-out infinite, glow 5s linear infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
            50% { box-shadow: 0 0 60px rgba(212, 175, 55, 0.6); }
        }

        .gif-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-family: 'Cookie', cursive;
            font-size: 4.8rem;
            color: var(--gold);
            margin: 25px 0 0 0;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.7);
            animation: fadeInDown 1.5s ease-out;
            text-align: center;
        }

        .subtitle {
            font-family: 'Alice', serif;
            font-style: italic;
            opacity: 0;
            margin-top: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.6rem;
            color: var(--gold);
            animation: fadeIn 2s ease-out forwards, starGlow 4s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        @keyframes starGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); opacity: 0.8; }
            50% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8); opacity: 1; }
        }

        .personal-note {
            font-style: italic;
            font-size: 1.15rem;
            opacity: 0;
            text-align: center;
            max-width: 480px;
            margin-bottom: 35px;
            line-height: 1.6;
            animation: fadeIn 2s ease-out forwards;
            animation-delay: 1s;
        }

        .spotify-link {
            margin-bottom: 45px;
            text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            padding: 12px 30px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            color: var(--gold);
            font-family: 'Alice', serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: transparent;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
            animation-delay: 1.5s;
        }

        .spotify-link:hover {
            background: var(--gold);
            color: var(--wine-red);
            box-shadow: 0 0 35px var(--gold);
            transform: scale(1.05);
        }

        .track {
            display: flex; align-items: center;
            padding: 22px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            transform: rotateX(-15deg) translateY(20px);
            animation: slideInTrack 0.8s ease-out forwards;
            backdrop-filter: blur(3px);
        }

        @keyframes slideInTrack {
            to { opacity: 1; transform: rotateX(0) translateY(0); }
        }

        .track:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            transform: scale(1.02) translateX(10px);
        }

        .track.active {
            background: rgba(212, 175, 55, 0.18);
            border-left: 8px solid var(--gold);
            transform: scale(1.04);
        }

        .track-number { color: var(--gold); font-family: 'Alice', serif; font-size: 1.2rem; width: 50px; }
        .track-info b { display: block; font-size: 1.25rem; color: var(--paper); }
        .track-info span { font-size: 0.95rem; opacity: 0.5; font-style: italic; }

        #player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, #000, rgba(20,5,5,0.98));
            border-top: 1px solid var(--gold);
            padding: 30px 0;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #player-bar.visible { transform: translateY(0); }
        #now-playing { margin-bottom: 15px; font-family: 'Alice', serif; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; }

        #custom-cursor {
            position: fixed; width: 15px; height: 15px;
            background: var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 10000;
            box-shadow: 0 0 20px var(--gold);
            transform: translate(-50%, -50%);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.2rem; }
            .subtitle { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="click-sound"><source src="click2.mp3" type="audio/mpeg"></audio>

    <div id="custom-cursor"></div>

    <div id="game-container">
        <div class="gif-container">
            <img src="ladyandthetramp.gif" alt="Lady and the Tramp">
        </div>

        <h1>Nastya’s Music Restaurant</h1>
        <p class="subtitle">"Bella Notte"</p>
        
        <div class="personal-note">
            Welcome to my personal restaurant. This isn't just a list of songs; it’s a very personal collection I’ve put together specifically for you. Each track holds a piece of a story I wanted to share.
        </div>

        <a href="https://open.spotify.com/playlist/6HN4qroqR4MQ1AGwCusL3W?si=ONr4vE16Ty6hMVgs4b9l-A" target="_blank" class="spotify-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 8px;"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.496 17.306c-.215.353-.675.463-1.028.249-2.856-1.745-6.452-2.14-10.686-1.171-.403.092-.806-.16-.898-.563-.092-.403.16-.806.563-.898 4.636-1.059 8.605-.61 11.799 1.343.353.214.464.674.25 1.04zm1.463-3.26c-.27.439-.844.582-1.282.311-3.267-2.008-8.246-2.593-12.109-1.42-.494.15-.1.023-.644-.12-.15-.494.12-.1.644.12 4.41-1.338 9.897-.68 13.621 1.61.438.27.582.844.314 1.282zm.127-3.41c-3.917-2.327-10.366-2.541-14.133-1.397-.601.183-1.234-.162-1.417-.763-.183-.601.162-1.234.763-1.417 4.317-1.31 11.439-1.058 15.937 1.613.54.32.716 1.014.396 1.554-.32.539-1.014.717-1.546.41z"/></svg>
            Save to Spotify
        </a>

        <div class="playlist" id="playlist-items"></div>
    </div>

    <div id="player-bar">
        <div id="now-playing">Pick a song from the menu...</div>
        <audio id="main-player" controls style="width: 80%; max-width: 500px;"></audio>
    </div>

    <script>
        // Звезды
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            starfield.appendChild(star);
        }

        const trackData = [
            { id: "01", title: "Back To The Old House", artist: "The Smiths", src: "song1.mp3" },
            { id: "02", title: "Say A Little Prayer For You", artist: "Aretha Franklin", src: "song2.mp3" },
            { id: "03", title: "High And Dry", artist: "Radiohead", src: "song3.mp3" },
            { id: "04", title: "Laughing on the Outside", artist: "Aretha Franklin", src: "song4.mp3" },
            { id: "05", title: "悲しみがとまらない", artist: "島津亜矢", src: "song5.mp3" },
            { id: "06", title: "Us And The Rest", artist: "M83", src: "song6.mp3" },
            { id: "07", title: "Miss Misery", artist: "Elliott Smith", src: "song7.mp3" },
            { id: "08", title: "Liquid Smooth", artist: "Mitski", src: "song8.mp3" },
            { id: "09", title: "LOVE YOU LESS", artist: "Joji", src: "song9.mp3" },
            { id: "10", title: "Hoppípolla", artist: "Sigur Rós", src: "song10.mp3" },
            { id: "11", title: "心做し (Live Version)", artist: "Majiko", src: "song11.mp3" },
            { id: "12", title: "Sojourn", artist: "Joji", src: "song12.mp3" },
            { id: "13", title: "I Really Want to Stay At Your House", artist: "Rosa Walton", src: "song13.mp3" },
            { id: "14", title: "Love Me More", artist: "Mitski", src: "song14.mp3" },
            { id: "15", title: "Heaven", artist: "Bryan Adams", src: "song15.mp3" }
        ];

        const playlistContainer = document.getElementById('playlist-items');
        const bgMusic = document.getElementById('bg-music');
        const mainPlayer = document.getElementById('main-player');
        const playerBar = document.getElementById('player-bar');

        trackData.forEach((track, index) => {
            const trackDiv = document.createElement('div');
            trackDiv.className = 'track';
            trackDiv.style.animationDelay = `${1.8 + (index * 0.1)}s`;
            trackDiv.innerHTML = `
                <div class="track-number">${track.id}</div>
                <div class="track-info"><b>${track.title}</b><span>${track.artist}</span></div>
            `;
            trackDiv.onclick = () => playSong(trackDiv, track.src, track.title);
            playlistContainer.appendChild(trackDiv);
        });

        function playSong(element, src, title) {
            bgMusic.pause();
            bgMusic.src = "";
            document.getElementById('click-sound').play();
            mainPlayer.src = src;
            mainPlayer.play();
            playerBar.classList.add('visible');
            document.getElementById('now-playing').innerText = "Now Playing: " + title;
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        mainPlayer.onended = function() {
            const tracks = Array.from(document.querySelectorAll('.track'));
            const currentTrack = document.querySelector('.track.active');
            const currentIndex = tracks.indexOf(currentTrack);
            if (currentIndex !== -1 && currentIndex < tracks.length - 1) {
                const nextTrack = tracks[currentIndex + 1];
                const nextData = trackData[currentIndex + 1];
                playSong(nextTrack, nextData.src, nextData.title);
            }
        };

        const startMusic = () => {
            if (bgMusic.paused && bgMusic.src !== "") {
                const savedTime = localStorage.getItem('musicTime');
                if (savedTime) bgMusic.currentTime = savedTime;
                bgMusic.volume = 0.4;
                bgMusic.play().catch(() => {});
            }
        };

        window.addEventListener('load', startMusic);
        document.addEventListener('mousemove', startMusic, { once: true });
        document.addEventListener('click', startMusic, { once: true });

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        setInterval(() => {
            if (bgMusic.src !== "" && !bgMusic.paused) {
                localStorage.setItem('musicTime', bgMusic.currentTime);
            }
        }, 1000);
    </script>
</body>
</html>
